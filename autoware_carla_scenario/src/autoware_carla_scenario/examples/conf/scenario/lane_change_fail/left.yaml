# @package _global_
scenario:
  name: lane_change
  direction: left
  expect: fail
  timeout_seconds: 1.5

ego:
  initial_speed_kmh: 1.0
  spawn_lanelet_id: 6
  spawn_s: 0.0

sweep:
  constraints:
    ego.spawn_lanelet_id:
      - type: and
        constraints:
          - type: not
            constraint:
              type: has_adjacent
              value: left
          - type: lanelet_length
            rule: greater_than_or_equal
            value: 15.0
          - type: not
            constraint:
              type: is_junction
          - type: not
            constraint:
              type: in_set
              values: ${map.no_3d_model_lanelet_ids}
