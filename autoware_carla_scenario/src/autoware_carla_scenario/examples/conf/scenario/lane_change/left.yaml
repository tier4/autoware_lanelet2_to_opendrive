# @package _global_
scenario:
  name: lane_change
  direction: left
  expect: success
  timeout_seconds: 10.0

ego:
  initial_speed_kmh: 1.0
  spawn_lanelet_id: 183
  spawn_s: 0.0

sweep:
  constraints:
    ego.spawn_lanelet_id:
      - type: and
        constraints:
          - type: has_adjacent
            value: left
          - type: lanelet_length
            rule: greater_than_or_equal
            value: 10.0
          - type: not
            constraint:
              type: is_junction
          - type: not
            constraint:
              type: in_set
              values: ${map.no_3d_model_lanelet_ids}
