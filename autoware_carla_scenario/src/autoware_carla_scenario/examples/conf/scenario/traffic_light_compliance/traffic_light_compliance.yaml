# @package _global_
scenario:
  name: traffic_light_compliance
  light_switch_delay_seconds: 3.0
  merging_time_seconds: 1.0
  timeout_seconds: 5.0
  moving_speed_kmh: 1.0

ego:
  initial_speed_kmh: 0.0
  spawn_lanelet_id: 242
  spawn_s: 15.0

sweep:
  constraints:
    ego.spawn_lanelet_id:
      - type: and
        constraints:
          - type: has_stop_line
          - type: has_traffic_light_stop_line
          - type: lanelet_ids
            ids:
              - 31
  bindings:
    ego.spawn_s:
      type: stop_line_offset
      offset: 3.0
