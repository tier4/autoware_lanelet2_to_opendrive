# @package _global_
entity:
  # Ground projection parameters for spawn-height refinement.
  # ray_distance_upper: search range (m) above the estimated z.
  # ray_distance_lower: search range (m) below the estimated z.
  ground_projection_ray_distance_upper: 5.0
  ground_projection_ray_distance_lower: 10.0
  # Spawn retry parameters.
  # When spawn fails (e.g. location occupied or out of map bounds),
  # retry by shifting the OpenDRIVE lateral offset t in increments of
  # spawn_retry_t_step (m) and recomputing the spawn position.
  spawn_retry_max_count: 10
  spawn_retry_t_step: 0.1
