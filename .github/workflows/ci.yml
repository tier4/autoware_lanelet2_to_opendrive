name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libboost-dev libeigen3-dev libpugixml-dev libgeographic-dev libboost-python-dev  libboost-serialization-dev librange-v3-dev libboost-filesystem-dev libboost-program-options-dev

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Configure git for private repositories
      run: |
        git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

    - name: Install dependencies
      run: uv sync --dev
      env:
        GIT_AUTH_TOKEN: ${{ secrets.GH_PAT }}

    - name: Run pre-commit hooks
      run: |
        uv run pre-commit install
        uv run pre-commit run --all-files
      continue-on-error: true

    - name: Run tests
      run: uv run pytest test/ -v --tb=short -n auto

    - name: Check package can be built
      run: uv build

  lint-and-format:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libboost-dev libeigen3-dev libpugixml-dev libgeographic-dev libboost-python-dev  libboost-serialization-dev librange-v3-dev libboost-filesystem-dev libboost-program-options-dev

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Configure git for private repositories
      run: |
        git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

    - name: Install dependencies
      run: uv sync --dev
      env:
        GIT_AUTH_TOKEN: ${{ secrets.GH_PAT }}

    - name: Run pre-commit hooks
      run: |
        uv run pre-commit install
        uv run pre-commit run --all-files

  docs:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libboost-dev libeigen3-dev libpugixml-dev libgeographic-dev libboost-python-dev  libboost-serialization-dev librange-v3-dev libboost-filesystem-dev libboost-program-options-dev

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Configure git for private repositories
      run: |
        git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

    - name: Install dependencies
      run: uv sync --dev
      env:
        GIT_AUTH_TOKEN: ${{ secrets.GH_PAT }}

    - name: Build documentation with version info
      run: |
        # Get git info
        export GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
        export GIT_COMMIT=$(git rev-parse --short HEAD)
        export VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')

        # Update mkdocs.yml with version info
        cat >> mkdocs.yml << EOF
          version_string: v${VERSION}
          git_branch: ${GIT_BRANCH}
          git_commit: ${GIT_COMMIT}
        EOF

        # Build documentation
        uv run mkdocs build --strict

    - name: Upload documentation artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: documentation
        path: site/
        retention-days: 7
