name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
    - uses: actions/checkout@v4

    - name: Setup environment
      uses: ./.github/actions/setup-env
      with:
        python-version: ${{ matrix.python-version }}
        gh-pat: ${{ secrets.GH_PAT }}
        install-system-deps: "true"
        install-dev-deps: "true"
        run-precommit: "true"
        precommit-continue-on-error: "true"

    - name: Run tests
      run: uv run pytest test/ -v --tb=short -n auto

    - name: Check package can be built
      run: uv build

  lint-and-format:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Setup environment
      uses: ./.github/actions/setup-env
      with:
        gh-pat: ${{ secrets.GH_PAT }}
        install-system-deps: "true"
        install-dev-deps: "true"
        run-precommit: "true"
        precommit-continue-on-error: "false"

  auto-format:
    name: Auto-fix formatting
    runs-on: ubuntu-22.04
    needs: lint-and-format
    if: |
      failure() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          gh-pat: ${{ secrets.GH_PAT }}
          install-system-deps: "true"
          install-dev-deps: "true"
          run-precommit: "false"

      - name: Run pre-commit auto-fix
        run: uv run pre-commit run --all-files || true

      - name: Commit and push if changes were made
        run: |
          if git diff --quiet; then
            echo "No formatting changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -u
          git commit -m "style: auto-fix formatting with pre-commit"
          git push

  docs:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup environment
      uses: ./.github/actions/setup-env
      with:
        gh-pat: ${{ secrets.GH_PAT }}
        install-system-deps: "true"
        install-dev-deps: "true"
        run-precommit: "false"

    - name: Build documentation with version info
      run: |
        # Get git info
        GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
        GIT_COMMIT=$(git rev-parse --short HEAD)
        VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        export GIT_BRANCH GIT_COMMIT VERSION

        # Update mkdocs.yml with version info
        cat >> mkdocs.yml << EOF
          version_string: v${VERSION}
          git_branch: ${GIT_BRANCH}
          git_commit: ${GIT_COMMIT}
        EOF

        # Build documentation (--strict treats warnings as errors)
        # Use mkdocs.ci.yml to exclude with-pdf plugin (avoids PDF WARNING in strict mode)
        uv run mkdocs build --strict --config-file mkdocs.ci.yml

    - name: Upload documentation artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: documentation
        path: site/
        retention-days: 7
