name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  test:
    name: test (${{ matrix.python-version }}, ${{ matrix.carla-extra }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - python-version: "3.10"
            carla-extra: "carla"
            runner: ubicloud-standard-4-ubuntu-2204
          - python-version: "3.10"
            carla-extra: "carla-0-9-16"
            runner: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Setup environment
      uses: ./.github/actions/setup-env
      with:
        python-version: ${{ matrix.python-version }}
        gh-pat: ${{ secrets.GH_PAT }}
        install-system-deps: "true"
        install-dev-deps: "true"
        run-precommit: "true"
        precommit-continue-on-error: "true"
        carla-extra: ${{ matrix.carla-extra }}
        cache-suffix: ${{ matrix.runner }}

    - name: Run tests
      run: uv run pytest -v --tb=short -n auto

    - name: Check package can be built
      run: |
        uv build --package autoware-lanelet2-to-opendrive
        uv build --package autoware-carla-scenario

  lint-and-format:
    runs-on: ubicloud-standard-4-ubuntu-2204
    steps:
    - uses: actions/checkout@v4

    - name: Setup environment
      uses: ./.github/actions/setup-env
      with:
        gh-pat: ${{ secrets.GH_PAT }}
        install-system-deps: "true"
        install-dev-deps: "true"
        run-precommit: "true"
        precommit-continue-on-error: "false"
        carla-extra: "carla"
        cache-suffix: ubicloud-standard-4-ubuntu-2204

  auto-format:
    name: Auto-fix formatting
    runs-on: ubuntu-22.04
    needs: lint-and-format
    if: |
      failure() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          gh-pat: ${{ secrets.GH_PAT }}
          install-system-deps: "true"
          install-dev-deps: "true"
          run-precommit: "false"
          carla-extra: "carla"
          cache-suffix: ubuntu-22.04

      - name: Run pre-commit auto-fix
        run: uv run pre-commit run --all-files || true

      - name: Commit and push if changes were made
        run: |
          if git diff --quiet; then
            echo "No formatting changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -u
          git commit -m "style: auto-fix formatting with pre-commit"
          git push

  docs:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup environment
      uses: ./.github/actions/setup-env
      with:
        gh-pat: ${{ secrets.GH_PAT }}
        install-system-deps: "true"
        install-dev-deps: "true"
        run-precommit: "false"
        carla-extra: "carla"
        cache-suffix: ubuntu-22.04

    - name: Build lanelet2-to-opendrive documentation
      uses: ./.github/actions/build-docs
      with:
        package-dir: autoware_lanelet2_to_opendrive
        config-file: mkdocs.ci.yml
        strict: "true"

    - name: Build carla-scenario documentation
      uses: ./.github/actions/build-docs
      with:
        package-dir: autoware_carla_scenario
        config-file: mkdocs.ci.yml
        strict: "true"

    - name: Upload lanelet2-to-opendrive documentation artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: documentation-lanelet2-to-opendrive
        path: autoware_lanelet2_to_opendrive/site/
        retention-days: 7

    - name: Upload carla-scenario documentation artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: documentation-carla-scenario
        path: autoware_carla_scenario/site/
        retention-days: 7

  check-src-changes:
    runs-on: ubicloud-standard-4-ubuntu-2204
    outputs:
      src-changed: ${{ steps.filter.outputs.src }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          src:
            - 'autoware_lanelet2_to_opendrive/src/autoware_lanelet2_to_opendrive/**'

  carla-import-test:
    needs: check-src-changes
    if: needs.check-src-changes.outputs.src-changed == 'true'
    runs-on: ubicloud-standard-4-ubuntu-2204
    steps:
    - uses: actions/checkout@v4

    - name: Setup environment
      uses: ./.github/actions/setup-env
      with:
        gh-pat: ${{ secrets.GH_PAT }}
        install-system-deps: "true"
        install-dev-deps: "true"
        run-precommit: "false"
        carla-extra: "carla"
        cache-suffix: ubicloud-standard-4-ubuntu-2204

    - name: Convert Lanelet2 map to OpenDRIVE (CARLA target)
      run: |
        uv run convert \
          map=nishishinjuku \
          target=carla \
          input_map_path=autoware_lanelet2_to_opendrive/test/data/nishishinjuku.osm \
          output_map_path=nishishinjuku_carla.xodr

    - name: Run CARLA import test
      run: |
        set -o pipefail
        uv run carla-import-test nishishinjuku_carla.xodr \
          --map-name nishishinjuku \
          | tee carla_import_test_result.txt

    - name: Run QC analysis
      run: |
        set -o pipefail
        uv run analyze nishishinjuku_carla.xodr \
          autoware_lanelet2_to_opendrive/test/data/nishishinjuku.osm \
          --output nishishinjuku_carla_qc_report.xqar \
          | tee analyze_result.txt

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: nishishinjuku_carla_artifacts
        path: |
          nishishinjuku_carla.xodr
          carla_import_test_result.txt
          nishishinjuku_carla_qc_report.xqar
          analyze_result.txt
        retention-days: 7

  qc-validate:
    runs-on: ubicloud-standard-4-ubuntu-2204
    steps:
    - uses: actions/checkout@v4
    - name: Setup environment
      uses: ./.github/actions/setup-env
      with:
        gh-pat: ${{ secrets.GH_PAT }}
        install-system-deps: "true"
        install-dev-deps: "true"
        run-precommit: "false"
        carla-extra: "carla"
        cache-suffix: ubicloud-standard-4-ubuntu-2204
    - name: Convert fixture map
      run: |
        uv run convert \
          map=nishishinjuku target=carla \
          input_map_path=autoware_lanelet2_to_opendrive/test/data/nishishinjuku.osm \
          output_map_path=nishishinjuku_carla.xodr
    - name: Run qc-framework validation
      run: uv run qc-validate nishishinjuku_carla.xodr
    - name: Upload artifacts on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: qc-validate-artifacts
        path: nishishinjuku_carla.xodr
        retention-days: 7
