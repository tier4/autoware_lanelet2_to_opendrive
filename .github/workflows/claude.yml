name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  # Fallback job to prevent workflow failure when main job is skipped
  # This ensures the workflow succeeds even when triggered by push events
  fallback:
    runs-on: ubuntu-latest
    steps:
      - name: Workflow triggered but no action needed
        run: |
          echo "Workflow was triggered by ${{ github.event_name }} event"
          echo "Main Claude job will only run on supported events with @claude mention"
          echo "This is expected behavior - no action required"

  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allow Claude to commit formatting changes
      pull-requests: write # Allow Claude to create/update PRs
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history for proper git operations
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-dev libeigen3-dev libpugixml-dev libgeographic-dev libboost-python-dev libboost-serialization-dev librange-v3-dev libboost-filesystem-dev libboost-program-options-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Configure git for private repositories
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
        if: secrets.GH_PAT != ''

      - name: Install dependencies and pre-commit
        run: |
          uv sync --dev
          uv run pre-commit install
        env:
          GIT_AUTH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr:*)'

      - name: Auto-format code (safety net)
        id: format
        if: always() && steps.claude.conclusion == 'success'
        run: |
          # Store current branch
          CURRENT_BRANCH=$(git branch --show-current)
          echo "current_branch=$CURRENT_BRANCH" >> $GITHUB_OUTPUT

          # Run pre-commit to format all files
          echo "Running pre-commit hooks to ensure code is formatted..."
          uv run pre-commit run --all-files || true

          # Check if there are any changes
          if [[ -n $(git status --porcelain) ]]; then
            echo "formatted=true" >> $GITHUB_OUTPUT
            echo "Files were modified by pre-commit hooks"
            git status --short
          else
            echo "formatted=false" >> $GITHUB_OUTPUT
            echo "No formatting changes needed"
          fi

      - name: Commit formatting changes
        if: always() && steps.format.outputs.formatted == 'true'
        run: |
          # Configure git
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          # Stage all changes
          git add -u

          # Commit formatting changes
          git commit -m "$(cat <<'EOF'
          style: auto-format code with ruff-format

          This commit was automatically created by GitHub Actions to ensure
          code formatting compliance with project standards.

          Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>
          EOF
          )"

          # Push changes
          git push origin HEAD

      - name: Summary
        if: always()
        run: |
          echo "### Claude Code Action Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.format.outputs.formatted }}" == "true" ]]; then
            echo "✅ Code was automatically formatted after Claude's changes" >> $GITHUB_STEP_SUMMARY
            echo "- Pre-commit hooks were run" >> $GITHUB_STEP_SUMMARY
            echo "- Formatting changes were committed" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No additional formatting needed" >> $GITHUB_STEP_SUMMARY
            echo "- Code was already properly formatted" >> $GITHUB_STEP_SUMMARY
          fi
