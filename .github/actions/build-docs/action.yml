name: Build Documentation
description: >
  Build mkdocs documentation for a package with version info injection.
  Supports strict mode, PDF export, and optional PDF copy to a target path.

inputs:
  package-dir:
    description: Package directory containing mkdocs.yml (e.g., autoware_lanelet2_to_opendrive)
    required: true
  config-file:
    description: MkDocs config file name relative to package-dir (e.g., mkdocs.ci.yml or mkdocs.yml)
    required: false
    default: "mkdocs.yml"
  version:
    description: Version string to inject. If empty, extracted from package-dir/pyproject.toml.
    required: false
    default: ""
  strict:
    description: Enable --strict mode (treats warnings as errors)
    required: false
    default: "false"
  enable-pdf:
    description: Enable PDF export via ENABLE_PDF_EXPORT env var
    required: false
    default: "false"
  pdf-output-path:
    description: Copy generated PDF to this path (relative to repo root). Skipped if empty or PDF not found.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Build documentation for ${{ inputs.package-dir }}
      shell: bash
      env:
        ENABLE_PDF_EXPORT: ${{ inputs.enable-pdf == 'true' && '1' || '' }}
      run: |
        set -euo pipefail
        pkg_dir="${{ inputs.package-dir }}"
        config_file="${pkg_dir}/${{ inputs.config-file }}"

        # Resolve version
        version="${{ inputs.version }}"
        if [ -z "${version}" ]; then
          version=$(grep '^version = ' "${pkg_dir}/pyproject.toml" | sed 's/version = "\(.*\)"/\1/')
        fi

        # Inject version info into mkdocs.yml
        GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
        GIT_COMMIT=$(git rev-parse --short HEAD)

        cat >> "${pkg_dir}/mkdocs.yml" << EOF
          version_string: v${version}
          git_branch: ${GIT_BRANCH}
          git_commit: ${GIT_COMMIT}
        EOF

        # Build
        strict_flag=""
        if [ "${{ inputs.strict }}" = "true" ]; then
          strict_flag="--strict"
        fi
        uv run mkdocs build ${strict_flag} --config-file "${config_file}"

        # Copy PDF if requested
        pdf_src="${pkg_dir}/site/pdf/documentation.pdf"
        pdf_dest="${{ inputs.pdf-output-path }}"
        if [ -n "${pdf_dest}" ] && [ -f "${pdf_src}" ]; then
          cp "${pdf_src}" "${pdf_dest}"
        fi
