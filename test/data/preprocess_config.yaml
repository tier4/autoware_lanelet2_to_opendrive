# Example configuration file for Lanelet2 map preprocessing
# This file demonstrates all available preprocessing operations

# Input and output paths
input_map_path: test/data/lanelet2_map.osm
output_map_path: test/data/lanelet2_map_processed.osm
mgrs_code: 54SUE

# Merge operations - merge multiple lanelets into one
# The merged lanelet is added to the map (originals are kept)
merge_operations:
  - lanelet_ids: [112, 114]
    validate: true
  - lanelet_ids: [113, 116]
    validate: true
  - lanelet_ids: [113, 115]
    validate: true

# Move point operations - move points to specific coordinates
move_point_operations:
  - point_id: 10030
    new_x: 81509.0771
    new_y: 50489.7863
  - point_id: 28339
    new_x: 81506.1119
    new_y: 50489.4558
  - point_id: 28301
    new_x: 81503.3119
    new_y: 50488.6425

delete_point_operations:
  - point_ids: [10034]

# Global settings
dry_run: false    # If true, only validate without saving output
verbose: false    # Enable detailed logging
