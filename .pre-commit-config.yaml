repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: 'mkdocs\.yml$'
      - id: check-added-large-files
        exclude: '\.(osm|xodr|png|whl)$'
      - id: check-merge-conflict
      - id: check-toml
      - id: debug-statements
      - id: mixed-line-ending

  # - repo: https://github.com/psf/black
  #   rev: 24.10.0
  #   hooks:
  #     - id: black
  #       language_version: python3.10

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        args:
          - --ignore-missing-imports
          - autoware_lanelet2_to_opendrive/src
          - autoware_lanelet2_to_opendrive/test
          - autoware_carla_scenario/src
          - autoware_carla_scenario/test
        pass_filenames: false
        always_run: true

  - repo: local
    hooks:
      # Run each package's tests in a separate process to avoid a crash in
      # the lanelet2 C++ bindings that occurs when both suites run together
      # and the interpreter shuts down with multiple LaneletMap instances alive.
      - id: pytest-lanelet2
        name: pytest (autoware_lanelet2_to_opendrive)
        entry: uv run pytest --no-testmon autoware_lanelet2_to_opendrive/test
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: pytest-carla
        name: pytest (autoware_carla_scenario)
        entry: uv run pytest --no-testmon -m "not integration" autoware_carla_scenario/test
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
