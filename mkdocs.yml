site_name: Autoware Lanelet2 to OpenDRIVE
site_url: https://tier4.github.io/autoware_lanelet2_to_opendrive/
site_description: Convert Lanelet2 map format to OpenDRIVE format for Autoware autonomous driving software
repo_url: https://github.com/tier4/autoware_lanelet2_to_opendrive
repo_name: tier4/autoware_lanelet2_to_opendrive

theme:
  name: material
  language: en
  custom_dir: overrides
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
  - with-pdf:
      author: Tier4 Autoware Team
      copyright: Copyright © 2025 Tier4
      cover_title: Autoware Lanelet2 to OpenDRIVE
      cover_subtitle: Documentation
      output_path: pdf/documentation.pdf
      enabled_if_env: ENABLE_PDF_EXPORT
      verbose: false
      exclude_pages:
        - 'api/'

markdown_extensions:
  - admonition
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Boundary Error Visualization: visualization.md
  - CARLA OpenDRIVE Mapping: carla_opendrive_lanelet2_mapping.md
  - Known Limitations:
    - Overview: limitations/index.md
    - Stop Line Position: limitations/stop-line-position.md
    - Lane Width: limitations/lane-width.md
    - Special Signals: limitations/special-signals.md
    - Priority Right-of-Way: limitations/priority-right-of-way.md
    - Geometric Approximation: limitations/geometric-approximation.md
    - Coordinate System: limitations/coordinate-system.md
  - Signals: signals.md
  - Conversion Process: conversion-process.md
  - API Reference: api.md
  - Development: development.md

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

extra_css:
  - stylesheets/extra.css

extra:
  version:
    provider: mike
    default: latest
    alias: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tier4/autoware_lanelet2_to_opendrive
