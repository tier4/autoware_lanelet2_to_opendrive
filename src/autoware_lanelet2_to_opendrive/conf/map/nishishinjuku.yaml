# Nishishinjuku map configuration

# MGRS grid for map projection (REQUIRED)
# Using MGRS grid with offset specification
mgrs_grid: 54SUE
offset:
  x: 81655.73
  y: 50137.43
  z: 42.49998

# Traffic rule for Japan (Left-Hand Traffic)
traffic_rule: "LHT"

# Merge operations - merge multiple lanelets into one
# The merged lanelet is added to the map (originals are kept)
merge_operations:
  - lanelet_ids: [112, 114]
    validate: true
  - lanelet_ids: [113, 116]
    validate: true
  - lanelet_ids: [113, 115]
    validate: true
  - lanelet_ids: [301024, 3001037, 301038]
    validate: true
  - lanelet_ids: [301029, 301030, 301031, 3001324]
    validate: true
  - lanelet_ids: [301021, 301033]
    validate: true

# Move point operations - move points to specific coordinates
move_point_operations:
  - point_id: 10030
    new_x: 81509.0771
    new_y: 50489.7863
  - point_id: 28339
    new_x: 81506.1119
    new_y: 50489.4558
  - point_id: 28301
    new_x: 81503.3119
    new_y: 50488.6425

delete_point_operations:
  - point_ids: [10034]

# Remove lanelet operations - remove entire lanelets from the map
remove_lanelet_operations:
  - lanelet_ids: [468, 124219]

remove_turn_direction_operations:
  - lanelet_ids: [472, 554, 124435, 301028, 3001150, 3001220, 3001225]

# ParamPoly3 segment generation configuration
# Optimized for Nishishinjuku to reduce memory usage in CARLA
# Coarser segmentation to prevent memory overflow in large maps
parampoly3:
  enabled: true
  min_segment_length: 0.5  # meters (CARLA minimum requirement)
  default_segment_length: 3.0  # meters (increased from 1.0m to reduce segment count)
  max_segments: 50  # reduced from 100 to prevent memory overflow
  min_segments: 1
  coefficient_epsilon: 1.0e-8

# Width spline sampling configuration
# Coarser sampling to further reduce memory usage
width_estimation:
  adaptive_sampling: true
  min_samples: 5
  max_samples: 20  # reduced from 50 to save memory
  default_sample_interval: 10.0  # 10m intervals (coarser than default 5m)
