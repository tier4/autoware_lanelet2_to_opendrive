# Example map configuration using latitude/longitude coordinates
# This format directly specifies the origin using geographic coordinates

# Latitude/longitude origin (ALTERNATIVE FORMAT)
lat_lon:
  latitude: -33.123456     # Latitude in decimal degrees
  longitude: 151.234567    # Longitude in decimal degrees
  altitude: 42.5           # Altitude in meters (optional, defaults to 0.0)

# Merge operations - merge multiple lanelets into one
merge_operations:
  # - lanelet_ids: [100, 101, 102]

# Remove operations - remove lanelets from the map
remove_operations:
  # - lanelet_ids: [300, 301, 302]

# Replace operations - replace multiple lanelets with a single merged one
replace_operations:
  # - lanelet_ids: [500, 501, 502]

# Move point operations - adjust individual point positions
move_point_operations:
  # - point_id: 12345
  #   new_x: 100.5
  #   new_y: 200.3

# Delete point operations - remove points from linestrings
delete_point_operations:
  # - point_ids: [12345, 12346]

# Remove lanelet operations - completely remove lanelets
remove_lanelet_operations:
  # - lanelet_ids: [900, 901]

# Remove turn direction operations - remove turn_direction attributes
remove_turn_direction_operations:
  # - lanelet_ids: []
