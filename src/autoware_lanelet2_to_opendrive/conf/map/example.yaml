# Example map-specific configuration
# Copy this file and customize for your specific map

# Origin specification (REQUIRED - choose ONE of the following methods):
#
# Method 1: Simple MGRS grid code
mgrs_grid: 54SUE815501
#
# Method 2: MGRS grid with offset (see example_mgrs_offset.yaml)
# mgrs_grid: 54SUE
# offset:
#   x: 81655.73
#   y: 50137.43
#   z: 42.49998
#
# Method 3: Latitude/longitude (see example_latlon.yaml)
# lat_lon:
#   latitude: -33.123456
#   longitude: 151.234567
#   altitude: 42.5
#
# NOTE: Only ONE base method (mgrs_grid or lat_lon) should be specified.
# The offset field can only be used with mgrs_grid.

# Merge operations - merge multiple lanelets into one
# First creates all merged lanelets, then removes the original lanelets
merge_operations:
  # - lanelet_ids: [100, 101, 102]
  #   validate: true         # Validate continuity before merging
  #   tolerance: 0.001       # Tolerance for continuity check (meters)
  #   base_id: 5000         # Optional: base ID for new lanelet (auto-generated if not set)
  # - lanelet_ids: [200, 201]
  #   validate: false       # Skip validation (useful for non-continuous lanelets)

# Remove operations - remove lanelets from the map
remove_operations:
  # - lanelet_ids: [300, 301, 302]
  # - lanelet_ids: [400]

# Replace operations - replace multiple lanelets with a single merged one
# Original lanelets are removed and replaced with the merged lanelet
replace_operations:
  # - lanelet_ids: [500, 501, 502]
  #   validate: true
  #   tolerance: 0.01
  # - lanelet_ids: [600, 601]
  #   validate: false

# Validate operations - check continuity between lanelet pairs
# These are informational only and don't modify the map
validate_operations:
  # - first_lanelet_id: 700
  #   second_lanelet_id: 701
  #   tolerance: 0.001
  # - first_lanelet_id: 800
  #   second_lanelet_id: 801
  #   tolerance: 0.005

# Move point operations - adjust individual point positions
move_point_operations:
  # - point_id: 12345
  #   new_x: 100.5
  #   new_y: 200.3
  #   new_z: 10.0  # Optional: if null, keeps original z

# Delete point operations - remove points from linestrings
delete_point_operations:
  # - point_ids: [12345, 12346]

# Remove lanelet operations - completely remove lanelets
remove_lanelet_operations:
  # - lanelet_ids: [900, 901]

# Remove turn direction operations - remove turn_direction attributes
remove_turn_direction_operations:
  # - lanelet_ids: []  # Empty list = remove from ALL lanelets
  # - lanelet_ids: [1000, 1001]  # Remove from specific lanelets only
