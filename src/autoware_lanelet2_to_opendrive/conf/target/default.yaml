# Default target configuration
# This configuration follows OpenDRIVE lane numbering specification
#
# Usage:
#   uv run python -m autoware_lanelet2_to_opendrive.main input_map_path=/path/to/map.osm
#   (target=default is implicit when not specified)
#
# This will:
#   - Read traffic_rule from map config if specified
#   - Generate OpenDRIVE output with proper lane numbering:
#     * LHT maps: Use LEFT lanes (positive IDs: +1, +2, +3...)
#     * RHT maps: Use RIGHT lanes (negative IDs: -1, -2, -3...)
#   - Compatible with CARLA, SUMO, CarMaker, and other OpenDRIVE-compliant tools
#
# Note: Reference line is positioned at road edge (not center) due to Lanelet2 structure:
#   - RHT: Reference at left edge (left boundary of leftmost lanelet)
#   - LHT: Reference at right edge (right boundary of rightmost lanelet)
#   This differs from typical OpenDRIVE convention but is more natural for Lanelet2 conversion.

# Exclude traffic signals not associated with junctions
# Default: false (include all signals)
# CARLA requires true (use target=carla for CARLA-specific settings)
exclude_non_junction_signals: false
