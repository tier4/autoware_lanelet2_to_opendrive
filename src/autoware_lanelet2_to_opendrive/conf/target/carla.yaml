# CARLA target configuration
# Settings specific to CARLA simulator compatibility

# CARLA requires traffic signals to be associated with junctions.
# This option excludes signals that are not in junctions.
exclude_non_junction_signals: true

# Traffic rule defaults to RHT (can be overridden via command line)
# traffic_rule: "RHT"

# ParamPoly3 segment generation configuration
# CARLA crashes when loading segments shorter than 0.5m
parampoly3:
  # Enable dynamic segment calculation (prevents short segments)
  enabled: true

  # Minimum allowed segment length (CARLA requirement)
  min_segment_length: 0.5  # meters

  # Target segment length for dynamic calculation
  default_segment_length: 1.0  # meters

  # Maximum number of segments per road (prevents excessive segmentation)
  max_segments: 100

  # Minimum number of segments per road
  min_segments: 1

  # Threshold for rounding small coefficients to zero
  coefficient_epsilon: 1.0e-8

# Width spline sampling configuration
# Adaptive sampling reduces memory usage for large maps
width_estimation:
  # Enable adaptive sampling based on road length
  adaptive_sampling: true

  # Minimum number of width samples per road
  min_samples: 5

  # Maximum number of width samples per road
  max_samples: 50

  # Target interval between width samples (meters)
  default_sample_interval: 5.0  # 5m intervals

# Geometry simplification (recommended for CARLA)
# Improves NPC navigation accuracy and reduces file complexity
geometry_simplification:
  # Enable simplification to improve CARLA compatibility
  enabled: true

  # Feature toggles
  convert_to_line: true
  convert_to_arc: true
  consolidate_segments: true

  # Line conversion thresholds
  line_cu_threshold: 0.001
  line_du_threshold: 0.0001
  line_cv_threshold: 0.001
  line_dv_threshold: 0.0001

  # Arc conversion thresholds
  arc_curvature_error_threshold: 0.01
  arc_position_error_threshold: 0.05  # meters

  # Consolidation thresholds (CARLA min_segment_length compatibility)
  min_segment_length: 5.0  # meters (must be >= 0.5m for CARLA)
  max_heading_diff_degrees: 5.0  # degrees
