# CARLA target configuration
# Settings specific to CARLA simulator requirements
#
# Usage:
#   uv run python -m autoware_lanelet2_to_opendrive.main input_map_path=/path/to/map.osm map=nishishinjuku target=carla
#
# This will:
#   - Read traffic_rule from map config (e.g., nishishinjuku.yaml: traffic_rule: LHT)
#   - Exclude non-junction signals as required by CARLA
#   - Generate OpenDRIVE-compliant output (LHT uses LEFT lanes, RHT uses RIGHT lanes)

# CARLA requires traffic signals to be associated with junctions.
# This option excludes signals that are not in junctions.
exclude_non_junction_signals: true
