[tool.uv]
find-links = ["carla_wheels"]

[tool.uv.workspace]
members = [
    "autoware_lanelet2_to_opendrive",
    "autoware_carla_scenario",
]

[tool.uv.sources]
lanelet2-python-api-for-autoware = { git = "https://github.com/tier4/lanelet2_python_api_for_autoware", rev = "6317c1c3dfe5f666e09b1a108defc0b407a3f338" }
# Use tier4 fork with relaxed numpy upper bound (upstream PR: asam-ev/qc-opendrive#138)
asam-qc-opendrive = { git = "https://github.com/tier4/qc-opendrive.git", rev = "f8b186ba7408f56d26ef6552643cc09d43c0d253" }

[dependency-groups]
dev = [
    "black>=25.11.0",
    "filelock>=3.13.0",
    "lark>=1.3.1",
    "mike>=2.1.3",
    "mkdocs>=1.6.0",
    "mkdocs-git-revision-date-localized-plugin>=1.5.1",
    "mkdocs-material>=9.5.0",
    "mkdocs-with-pdf>=0.9.3",
    "mkdocstrings[python]>=0.27.0",
    "mypy>=1.19.0",
    "pre-commit>=4.5.0",
    "pytest>=9.0.3",
    "pytest-testmon>=2.2.0",
    "pytest-xdist>=3.8.0",
    "weasyprint>=68.0",
]

[tool.mypy]
ignore_missing_imports = true
exclude = ["conftest\\.py$"]

[[tool.mypy.overrides]]
# Pre-existing type errors in the l2o package are out of scope for this PR.
# They were not caught before because mypy ran on individual staged files only.
module = [
    "autoware_lanelet2_to_opendrive",
    "autoware_lanelet2_to_opendrive.*",
]
ignore_errors = true

[tool.pytest.ini_options]
testpaths = [
    "autoware_lanelet2_to_opendrive/test",
    "autoware_carla_scenario/test",
]
addopts = "-n auto --testmon"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests requiring a running CARLA server",
]
