# Hydra configuration for Lanelet2 to OpenDRIVE conversion
# Usage: uv run python -m autoware_lanelet2_to_opendrive.main map=<map_name> target=<target_name>

defaults:
  - _self_
  - map: example
  - target: default

# Input and output paths (can be overridden via CLI)
input_map_path: ???  # Required: path to input Lanelet2 OSM file
output_map_path: null  # Optional: output file path

# Global settings
dry_run: false    # If true, only validate without saving output
verbose: false    # Enable detailed logging

# Pin connecting-road reference-line endpoints to the rendered endpoints of
# the linked incoming/outgoing regular roads (P0-2 junction endpoint
# fidelity).  Disabled by default; the override currently breaks the
# conversion-vs-geometric mapping cross-check on some maps (issue #431).
# Re-enable with `pin_junction_endpoints=true` once the root cause lands.
pin_junction_endpoints: false
