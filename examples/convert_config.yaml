# Example configuration file for converting Lanelet2 to OpenDRIVE
# This file contains both MGRS projection info and optional preprocessing operations

# Input and output paths
input_map_path: /path/to/input.osm
output_map_path: /tmp/preprocessed.osm  # Optional: temporary file for preprocessed map

# MGRS code for map projection (REQUIRED)
mgrs_code: 54SUE815501

# Optional preprocessing operations
# Comment out or remove sections you don't need

# Merge operations: Combine multiple lanelets into one
merge_operations:
  # - lanelet_ids: [100, 101, 102]
  #   validate: true
  #   tolerance: 0.001

# Remove operations: Remove specific lanelets
remove_operations:
  # - lanelet_ids: [300, 301]

# Replace operations: Replace lanelets with merged version
replace_operations:
  # - lanelet_ids: [400, 401, 402]
  #   validate: true
  #   tolerance: 0.001

# Validation operations: Check lanelet continuity
validate_operations:
  # - first_lanelet_id: 500
  #   second_lanelet_id: 501
  #   tolerance: 0.01

# Global settings
dry_run: false    # If true, only validate without saving
verbose: false    # Enable verbose logging
