# Example configuration file for Lanelet2 map preprocessing
# This file demonstrates all available preprocessing operations

# Input and output paths
input_map_path: /path/to/input/lanelet2_map.osm
output_map_path: /path/to/output/processed_map.osm

# Merge operations - merge multiple lanelets into one
# The merged lanelet is added to the map (originals are kept)
merge_operations:
  - lanelet_ids: [100, 101, 102]
    validate: true         # Validate continuity before merging
    tolerance: 0.001       # Tolerance for continuity check (meters)
    base_id: 5000         # Optional: base ID for new lanelet (auto-generated if not set)

  - lanelet_ids: [200, 201]
    validate: false       # Skip validation (useful for non-continuous lanelets)

# Remove operations - remove lanelets from the map
remove_operations:
  - lanelet_ids: [300, 301, 302]
  - lanelet_ids: [400]

# Replace operations - replace multiple lanelets with a single merged one
# Original lanelets are removed and replaced with the merged lanelet
replace_operations:
  - lanelet_ids: [500, 501, 502]
    validate: true
    tolerance: 0.01

  - lanelet_ids: [600, 601]
    validate: false

# Validate operations - check continuity between lanelet pairs
# These are informational only and don't modify the map
validate_operations:
  - first_lanelet_id: 700
    second_lanelet_id: 701
    tolerance: 0.001

  - first_lanelet_id: 800
    second_lanelet_id: 801
    tolerance: 0.005

# Global settings
dry_run: false    # If true, only validate without saving output
verbose: false    # Enable detailed logging
